workflows:
  ios-release:
    name: NL VIP Team - iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      # This name MUST match the App Store Connect integration configured in
      # Codemagic → Team/Personal Settings → Integrations. Renaming it here
      # does NOT rename the integration — it breaks the lookup.
      app_store_connect: "NL VIP Club Key"

    environment:
      vars:
        BUNDLE_ID: "com.leonardos.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6759666320"
        # Activa el early-return en rutas API dinámicas (p.ej. cron) para que
        # Next.js no intente prerenderizar handlers que leen request.headers
        # cuando se hace `output: 'export'`.
        STATIC_EXPORT: "true"
      node: v20.11.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build Next.js for mobile
        script: |
          set -e
          rm -rf .next out
          cp next.config.mobile.js next.config.js
          npm run build
          git checkout next.config.js
          ls -la out
          # Fail fast if the static export didn't produce an index.html —
          # otherwise cap sync would ship an empty public/ and the WebView
          # would load a blank screen on TestFlight.
          test -f out/index.html || { echo "BUILD FAILED: out/index.html missing"; exit 1; }

      - name: Sync Capacitor
        script: |
          npx cap sync ios --inline

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Set marketing version and build number
        script: |
          cd ios/App
          # Incrementar marketing version (1.33 → 1.34, etc.)
          # Extrae la versión actual, incrementa el minor, y la establece
          CURRENT_VERSION=$(agvtool what-marketing-version -terse)
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR.0"
          agvtool new-marketing-version "$NEW_VERSION"
          echo "Bumped version from $CURRENT_VERSION to $NEW_VERSION"

          # Usamos el número de build interno de Codemagic para asegurar que siempre sea único y mayor
          agvtool new-version -all $(($BUILD_NUMBER + 10))

      - name: Fetch signing files
        script: |
          keychain initialize
          # Generar clave privada para el certificado de distribución
          openssl genrsa -out /tmp/cert_key.pem 2048
          # Descargar perfiles y crear certificado automáticamente
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates

      - name: Build and sign iOS app
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
