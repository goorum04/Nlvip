workflows:
  ios-release:
    name: NL VIP Club - iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "NL VIP Club Key"

    environment:
      vars:
        BUNDLE_ID: "com.leonardos.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6759666320"
        STATIC_EXPORT: "true"
        NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
        SUPABASE_SERVICE_ROLE_KEY: "placeholder"
        OPENAI_API_KEY: "placeholder"
        NEXT_PUBLIC_SITE_URL: "https://nlvip.vercel.app"
      node: v20.11.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build Next.js for mobile
        script: |
          rm -rf .next out
          npx next build
          ls -la out

      - name: Sync Capacitor
        script: |
          npx cap sync ios --inline

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Set build number from CI
        script: |
          cd ios/App
          # Usamos el número de build interno de Codemagic para asegurar que siempre sea único y mayor
          agvtool new-version -all $(($BUILD_NUMBER + 10))

      - name: Fetch signing files
        script: |
          keychain initialize
          # Generar clave privada para el certificado de distribución
          openssl genrsa -out /tmp/cert_key.pem 2048
          # Descargar perfiles y crear certificado automáticamente
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates

      - name: Build and sign iOS app
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
